name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag to create, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build ${{ matrix.id }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: linux-amd64
            goos: linux
            goarch: amd64
            ext: ''
          - id: linux-amd64-v3
            goos: linux
            goarch: amd64
            goamd64: v3
            ext: ''
          - id: linux-arm64
            goos: linux
            goarch: arm64
            ext: ''
          - id: linux-armv7
            goos: linux
            goarch: arm
            goarm: '7'
            ext: ''
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Compute version
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            RELEASE_TAG="${{ inputs.tag_name }}"
          else
            RELEASE_TAG="${GITHUB_REF_NAME}"
          fi
          case "${RELEASE_TAG}" in
            v*) ;;
            *) RELEASE_TAG="v${RELEASE_TAG}" ;;
          esac
          VERSION_TAG="${RELEASE_TAG#v}"
          echo "RELEASE_TAG=${RELEASE_TAG}" >> "$GITHUB_ENV"
          echo "VERSION_TAG=${VERSION_TAG}" >> "$GITHUB_ENV"
          echo "ARCHIVE_NAME=mosdns-${VERSION_TAG}-${{ matrix.id }}.tar.gz" >> "$GITHUB_ENV"

      - name: Build binary
        shell: bash
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOAMD64: ${{ matrix.goamd64 }}
          GOARM: ${{ matrix.goarm }}
        run: |
          mkdir -p dist
          BIN_NAME="mosdns${{ matrix.ext }}"
          go build \
            -trimpath \
            -ldflags "-s -w -X main.version=${VERSION_TAG}" \
            -o "dist/${BIN_NAME}" \
            ./

      - name: Package tar.gz
        shell: bash
        run: |
          BIN_NAME="mosdns${{ matrix.ext }}"
          tar -C dist -czf "${ARCHIVE_NAME}" "${BIN_NAME}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.id }}
          path: ${{ env.ARCHIVE_NAME }}
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Compute release tag
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            RELEASE_TAG="${{ inputs.tag_name }}"
          else
            RELEASE_TAG="${GITHUB_REF_NAME}"
          fi
          case "${RELEASE_TAG}" in
            v*) ;;
            *) RELEASE_TAG="v${RELEASE_TAG}" ;;
          esac
          echo "RELEASE_TAG=${RELEASE_TAG}" >> "$GITHUB_ENV"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: release-artifacts/*.tar.gz
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
