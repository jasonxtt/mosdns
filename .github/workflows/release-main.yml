name: Preview Release (main)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: preview-release-main
  cancel-in-progress: false

jobs:
  build:
    name: build ${{ matrix.id }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: linux-amd64
            goos: linux
            goarch: amd64
            ext: ''
          - id: linux-amd64-v3
            goos: linux
            goarch: amd64
            goamd64: v3
            ext: ''
          - id: linux-arm64
            goos: linux
            goarch: arm64
            ext: ''
          - id: linux-armv7
            goos: linux
            goarch: arm
            goarm: '7'
            ext: ''
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Compute preview version
        shell: bash
        run: |
          DATE=$(date -u +%Y%m%d)
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          VERSION_TAG="preview-${DATE}-${SHORT_SHA}"
          echo "BUILD_VERSION=${VERSION_TAG}" >> "$GITHUB_ENV"
          echo "VERSION_TAG=${VERSION_TAG}" >> "$GITHUB_ENV"
          echo "ARCHIVE_NAME=mosdns-${VERSION_TAG}-${{ matrix.id }}.tar.gz" >> "$GITHUB_ENV"

      - name: Build binary
        shell: bash
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOAMD64: ${{ matrix.goamd64 }}
          GOARM: ${{ matrix.goarm }}
        run: |
          mkdir -p dist
          BIN_NAME="mosdns${{ matrix.ext }}"
          go build \
            -trimpath \
            -ldflags "-s -w -X main.version=${BUILD_VERSION}" \
            -o "dist/${BIN_NAME}" \
            ./

      - name: Package tar.gz
        shell: bash
        run: |
          BIN_NAME="mosdns${{ matrix.ext }}"
          tar -C dist -czf "${ARCHIVE_NAME}" "${BIN_NAME}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.id }}
          path: ${{ env.ARCHIVE_NAME }}
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Compute preview version
        shell: bash
        run: |
          DATE=$(date -u +%Y%m%d)
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          VERSION_TAG="preview-${DATE}-${SHORT_SHA}"
          echo "VERSION_TAG=${VERSION_TAG}" >> "$GITHUB_ENV"

      - name: Publish preview release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION_TAG }}
          name: ${{ env.VERSION_TAG }}
          files: release-artifacts/*.tar.gz
          prerelease: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
