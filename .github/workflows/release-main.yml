name: Preview Release (main)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: preview-release-main
  cancel-in-progress: false

jobs:
  build:
    name: build ${{ matrix.id }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: android-arm64
            goos: android
            goarch: arm64
            ext: ''
          - id: darwin-amd64
            goos: darwin
            goarch: amd64
            ext: ''
          - id: darwin-arm64
            goos: darwin
            goarch: arm64
            ext: ''
          - id: windows-amd64
            goos: windows
            goarch: amd64
            ext: '.exe'
          - id: windows-amd64-v3
            goos: windows
            goarch: amd64
            goamd64: v3
            ext: '.exe'
          - id: windows-arm64
            goos: windows
            goarch: arm64
            ext: '.exe'
          - id: linux-amd64
            goos: linux
            goarch: amd64
            ext: ''
          - id: linux-amd64-v3
            goos: linux
            goarch: amd64
            goamd64: v3
            ext: ''
          - id: linux-arm64
            goos: linux
            goarch: arm64
            ext: ''
          - id: linux-armv5
            goos: linux
            goarch: arm
            goarm: '5'
            ext: ''
          - id: linux-armv6
            goos: linux
            goarch: arm
            goarm: '6'
            ext: ''
          - id: linux-armv7
            goos: linux
            goarch: arm
            goarm: '7'
            ext: ''
          - id: linux-mips
            goos: linux
            goarch: mips
            ext: ''
          - id: linux-mips-softfloat
            goos: linux
            goarch: mips
            gomips: softfloat
            ext: ''
          - id: linux-mips64
            goos: linux
            goarch: mips64
            ext: ''
          - id: linux-mips64-softfloat
            goos: linux
            goarch: mips64
            gomips64: softfloat
            ext: ''
          - id: linux-mipsle
            goos: linux
            goarch: mipsle
            ext: ''
          - id: linux-mipsle-softfloat
            goos: linux
            goarch: mipsle
            gomips: softfloat
            ext: ''
          - id: linux-mips64le
            goos: linux
            goarch: mips64le
            ext: ''
          - id: linux-mips64le-softfloat
            goos: linux
            goarch: mips64le
            gomips64: softfloat
            ext: ''
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Compute preview version
        shell: bash
        run: |
          DATE=$(date -u +%Y%m%d)
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          VERSION_TAG="preview-${DATE}-${SHORT_SHA}"
          echo "VERSION_TAG=${VERSION_TAG}" >> "$GITHUB_ENV"
          echo "ARCHIVE_NAME=mosdns-${VERSION_TAG}-${{ matrix.id }}.tar.gz" >> "$GITHUB_ENV"

      - name: Build binary
        shell: bash
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOAMD64: ${{ matrix.goamd64 }}
          GOARM: ${{ matrix.goarm }}
          GOMIPS: ${{ matrix.gomips }}
          GOMIPS64: ${{ matrix.gomips64 }}
        run: |
          mkdir -p dist
          BIN_NAME="mosdns${{ matrix.ext }}"
          go build \
            -trimpath \
            -ldflags "-s -w -X main.version=${VERSION_TAG}" \
            -o "dist/${BIN_NAME}" \
            ./

      - name: Package tar.gz
        shell: bash
        run: |
          BIN_NAME="mosdns${{ matrix.ext }}"
          tar -C dist -czf "${ARCHIVE_NAME}" "${BIN_NAME}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.id }}
          path: ${{ env.ARCHIVE_NAME }}
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Compute preview version
        shell: bash
        run: |
          DATE=$(date -u +%Y%m%d)
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          VERSION_TAG="preview-${DATE}-${SHORT_SHA}"
          echo "VERSION_TAG=${VERSION_TAG}" >> "$GITHUB_ENV"

      - name: Publish preview release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION_TAG }}
          name: ${{ env.VERSION_TAG }}
          files: release-artifacts/*.tar.gz
          prerelease: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
